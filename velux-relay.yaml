    stop_action:
      - lambda: "id(dir4)=0;"
      - switch.turn_off: r4_up
      - switch.turn_off: r4_down

button:
  - platform: template
    name: "Home Rolluik 1"
    id: hr1
    on_press:
      - if:
          condition:
            lambda: 'return !id(is_homing1) && !id(is_homing2) && !id(is_homing3) && !id(is_homing4);'
          then:
            - lambda: 'id(is_homing1) = true;'
            - cover.open: rolluik_1
            - delay: 1s
            - wait_until:
                condition:
                  lambda: 'return id(current1).state > 1.5;'
                timeout: 45s
            - cover.stop: rolluik_1
            - lambda: |-
                id(pos1) = 0;
                id(enc1_abs) = 0;
            - delay: 1s
            - cover.close: rolluik_1
            - delay: 1s
            - wait_until:
                condition:
                  lambda: 'return id(current1).state > 1.5;'
                timeout: 45s
            - delay: 100ms
            - cover.stop: rolluik_1
            - lambda: |-
                id(max1) = abs(id(pos1));
                id(is_homing1) = false;
            - logger.log: "Homing Rolluik 1 voltooid"
          else:
            - logger.log: "Homing already in progress"

