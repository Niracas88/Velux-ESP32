substitutions:
  device_name: "waveshare-relay-velux"
  device_comment: "WaveShare ESP32-S3-POE-ETH-8DI-8RO"
  device_friendly: "Velux Rolluiken"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly}
  min_version: 2025.5.0
  comment: ${device_comment}
  name_add_mac_suffix: false

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption: { key: !secret api_encryption_key }

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12

web_server:
  port: 80

i2c:
  sda: GPIO42
  scl: GPIO41
  scan: true
  frequency: 400kHz
  id: i2cbus

pca9554:
  - id: TCA9554_hub
    address: 0x20

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - pcf85063.write_time:
  - platform: pcf85063
    id: pcf85063_time

globals:
  # Positie voor 4 motoren
  - { id: pos1, type: int, restore_value: yes }
  - { id: pos2, type: int, restore_value: yes }
  - { id: pos3, type: int, restore_value: yes }
  - { id: pos4, type: int, restore_value: yes }

  # Absolute encoder teller
  - { id: enc1_abs, type: int, restore_value: yes }
  - { id: enc2_abs, type: int, restore_value: yes }
  - { id: enc3_abs, type: int, restore_value: yes }
  - { id: enc4_abs, type: int, restore_value: yes }

  # Max positie
  - { id: max1, type: int, initial_value: '10000', restore_value: yes }
  - { id: max2, type: int, initial_value: '10000', restore_value: yes }
  - { id: max3, type: int, initial_value: '10000', restore_value: yes }
  - { id: max4, type: int, initial_value: '10000', restore_value: yes }

  # Richting (1=up, -1=down, 0=stop)
  - { id: dir1, type: int }
  - { id: dir2, type: int }
  - { id: dir3, type: int }
  - { id: dir4, type: int }

  # Starttijd voor timeout beveiliging
  - { id: start_time1, type: uint32_t }
  - { id: start_time2, type: uint32_t }
  - { id: start_time3, type: uint32_t }
  - { id: start_time4, type: uint32_t }

  # Homing status
  - { id: is_homing1, type: bool, initial_value: 'false' }
  - { id: is_homing2, type: bool, initial_value: 'false' }
  - { id: is_homing3, type: bool, initial_value: 'false' }
  - { id: is_homing4, type: bool, initial_value: 'false' }

sensor:
  # INA219 Stroommeting & Vermogen
  - platform: ina219
    address: 0x40
    shunt_resistance: 0.1
    update_interval: 100ms
    current:
      name: "Rolluik 1 Stroom"
      id: current1
    power:
      name: "Rolluik 1 Vermogen"
      id: power1

  - platform: ina219
    address: 0x41
    shunt_resistance: 0.1
    update_interval: 100ms
    current:
      name: "Rolluik 2 Stroom"
      id: current2
    power:
      name: "Rolluik 2 Vermogen"
      id: power2

  - platform: ina219
    address: 0x42
    shunt_resistance: 0.1
    update_interval: 100ms
    current:
      name: "Rolluik 3 Stroom"
      id: current3
    power:
      name: "Rolluik 3 Vermogen"
      id: power3

  - platform: ina219
    address: 0x43
    shunt_resistance: 0.1
    update_interval: 100ms
    current:
      name: "Rolluik 4 Stroom"
      id: current4
    power:
      name: "Rolluik 4 Vermogen"
      id: power4

  # Pulse Counters (encoders)
  - platform: pulse_counter
    pin: GPIO4
    id: enc1
    internal: true
    update_interval: 100ms
    on_value:
      then:
        - lambda: "if(id(dir1)==1)id(enc1_abs)+=(int)x; else if(id(dir1)==-1)id(enc1_abs)-=(int)x; if(id(dir1)!=0)id(pos1)=id(enc1_abs);"

  - platform: pulse_counter
    pin: GPIO5
    id: enc2
    internal: true
    update_interval: 100ms
    on_value:
      then:
        - lambda: "if(id(dir2)==1)id(enc2_abs)+=(int)x; else if(id(dir2)==-1)id(enc2_abs)-=(int)x; if(id(dir2)!=0)id(pos2)=id(enc2_abs);"

  - platform: pulse_counter
    pin: GPIO6
    id: enc3
    internal: true
    update_interval: 100ms
    on_value:
      then:
        - lambda: "if(id(dir3)==1)id(enc3_abs)+=(int)x; else if(id(dir3)==-1)id(enc3_abs)-=(int)x; if(id(dir3)!=0)id(pos3)=id(enc3_abs);"

  - platform: pulse_counter
    pin: GPIO7
    id: enc4
    internal: true
    update_interval: 100ms
    on_value:
      then:
        - lambda: "if(id(dir4)==1)id(enc4_abs)+=(int)x; else if(id(dir4)==-1)id(enc4_abs)-=(int)x; if(id(dir4)!=0)id(pos4)=id(enc4_abs);"

switch:
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 0 }, id: r1_up, interlock: [r1_down], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 1 }, id: r1_down, interlock: [r1_up], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 2 }, id: r2_up, interlock: [r2_down], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 3 }, id: r2_down, interlock: [r2_up], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 4 }, id: r3_up, interlock: [r3_down], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 5 }, id: r3_down, interlock: [r3_up], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 6 }, id: r4_up, interlock: [r4_down], restore_mode: ALWAYS_OFF }
  - { platform: gpio, pin: { pca9554: TCA9554_hub, number: 7 }, id: r4_down, interlock: [r4_up], restore_mode: ALWAYS_OFF }

cover:
  - platform: template
    name: "Rolluik 1"
    id: rolluik_1
    device_class: shutter
    has_position: true
    lambda: "return (id(max1) > 0) ? (float)id(pos1) / id(max1) : 0.0;"
    optimistic: false
    position_action:
      - lambda: "int t=(int)(pos*id(max1)); if(t>id(pos1))id(rolluik_1).open(); else if(t<id(pos1))id(rolluik_1).close(); else id(rolluik_1).stop();"
    open_action:
      - lambda: "id(dir1)=1; id(start_time1)=millis();"
      - switch.turn_off: r1_down
      - delay: 400ms
      - switch.turn_on: r1_up
    close_action:
      - lambda: "id(dir1)=-1; id(start_time1)=millis();"
      - switch.turn_off: r1_up
      - delay: 400ms
      - switch.turn_on: r1_down
    stop_action:
      - lambda: "id(dir1)=0;"
      - switch.turn_off: r1_up
      - switch.turn_off: r1_down

  - platform: template
    name: "Rolluik 2"
    id: rolluik_2
    device_class: shutter
    has_position: true
    lambda: "return (id(max2) > 0) ? (float)id(pos2) / id(max2) : 0.0;"
