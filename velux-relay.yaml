    device_class: shutter
    has_position: true
    lambda: "return (id(max3) > 0) ? (float)id(pos3) / id(max3) : 0.0;"
    optimistic: false
    position_action:
      - lambda: "int t=(int)(pos*id(max3)); if(t>id(pos3))id(rolluik_3).open(); else if(t<id(pos3))id(rolluik_3).close(); else id(rolluik_3).stop();"
    open_action:
      - lambda: "id(dir3)=1; id(start_time3)=millis();"
      - switch.turn_off: r3_down
      - delay: 400ms
      - switch.turn_on: r3_up
    close_action:
      - lambda: "id(dir3)=-1; id(start_time3)=millis();"
