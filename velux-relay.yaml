interval:
  - interval: 200ms
    then:
      - lambda: |-
          const uint32_t MAX_TIME = 45000;

          auto check_motor = [](int &dir, int pos, int maxv, uint32_t start, float curr, bool homing, auto &up_sw, auto &down_sw, const char* name) {
            if (dir == 0) return;
            
            uint32_t runtime = millis() - start;
            
            // Check if target position reached
            if (maxv > 0) {
              float current_pos = (float)pos / maxv;
              if ((dir == 1 && current_pos >= 0.99) || (dir == -1 && current_pos <= 0.01)) {
                dir = 0;
                up_sw->turn_off();
                down_sw->turn_off();
                return;
              }
            }
            
            // Stall detection (only if not homing)
            if (dir != 0 && !homing && curr > 1.8 && runtime > 1200) {
              dir = 0;
              up_sw->turn_off();
              down_sw->turn_off();
              ESP_LOGW("STALL", "%s gestopt op stroom: %.2fA", name, curr);
              return;
            }
            
            // Timeout check
            if (dir != 0 && runtime > MAX_TIME) {
              dir = 0;
              up_sw->turn_off();
              down_sw->turn_off();
              ESP_LOGE("TIMEOUT", "%s noodstop: tijd overschreden", name);
            }
          };
          
          check_motor(id(dir1), id(pos1), id(max1), id(start_time1), id(current1).state, id(is_homing1), id(r1_up), id(r1_down), "Rolluik 1");
          check_motor(id(dir2), id(pos2), id(max2), id(start_time2), id(current2).state, id(is_homing2), id(r2_up), id(r2_down), "Rolluik 2");
          check_motor(id(dir3), id(pos3), id(max3), id(start_time3), id(current3).state, id(is_homing3), id(r3_up), id(r3_down), "Rolluik 3");
          check_motor(id(dir4), id(pos4), id(max4), id(start_time4), id(current4).state, id(is_homing4), id(r4_up), id(r4_down), "Rolluik 4");
