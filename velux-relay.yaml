      - switch.turn_off: r3_down

  - platform: template
    name: "Rolluik 4"
    id: rolluik_4
    device_class: shutter
    has_position: true
    lambda: "return (id(max4) > 0) ? (float)id(pos4) / id(max4) : 0.0;"
    optimistic: false
    position_action:
      - lambda: "int t=(int)(pos*id(max4)); if(t>id(pos4))id(rolluik_4).open(); else if(t<id(pos4))id(rolluik_4).close(); else id(rolluik_4).stop();"
    open_action:
      - lambda: "id(dir4)=1; id(start_time4)=millis();"
