      - delay: 400ms
      - switch.turn_on: r2_down
    stop_action:
      - lambda: "id(dir2)=0;"
      - switch.turn_off: r2_up
      - switch.turn_off: r2_down

  - platform: template
    name: "Rolluik 3"
