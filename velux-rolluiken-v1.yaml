# ======================
# HOMING BUTTONS
# ======================

button:
  - platform: template
    name: "Home Rolluik 1"
    id: hr1
    on_press:
      - lambda: 'id(is_homing1) = true;'
      - cover.open: rolluik_1
      - delay: 1s # Wachten tot inrush current voorbij is
      - wait_until:
          condition:
            lambda: 'return id(current1).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_1
      - lambda: |-
          id(pos1) = 0;
          id(enc1_abs) = 0;
      - delay: 1s
      - cover.close: rolluik_1
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current1).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_1
      - lambda: |-
          id(max1) = abs(id(pos1));
          id(is_homing1) = false;
      - logger.log: "Homing Rolluik 1 voltooid"

  - platform: template
    name: "Home Rolluik 2"
    id: hr2
    on_press:
      - lambda: 'id(is_homing2) = true;'
      - cover.open: rolluik_2
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current2).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_2
      - lambda: |-
          id(pos2) = 0;
          id(enc2_abs) = 0;
      - delay: 1s
      - cover.close: rolluik_2
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current2).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_2
      - lambda: |-
          id(max2) = abs(id(pos2));
          id(is_homing2) = false;
      - logger.log: "Homing Rolluik 2 voltooid"

  - platform: template
    name: "Home Rolluik 3"
    id: hr3
    on_press:
      - lambda: 'id(is_homing3) = true;'
      - cover.open: rolluik_3
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current3).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_3
      - lambda: |-
          id(pos3) = 0;
          id(enc3_abs) = 0;
      - delay: 1s
      - cover.close: rolluik_3
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current3).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_3
      - lambda: |-
          id(max3) = abs(id(pos3));
          id(is_homing3) = false;
      - logger.log: "Homing Rolluik 3 voltooid"

  - platform: template
    name: "Home Rolluik 4"
    id: hr4
    on_press:
      - lambda: 'id(is_homing4) = true;'
      - cover.open: rolluik_4
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current4).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_4
      - lambda: |-
          id(pos4) = 0;
          id(enc4_abs) = 0;
      - delay: 1s
      - cover.close: rolluik_4
      - delay: 1s
      - wait_until:
          condition:
            lambda: 'return id(current4).state > 1.5;'
          timeout: 45s
      - cover.stop: rolluik_4
      - lambda: |-
          id(max4) = abs(id(pos4));
          id(is_homing4) = false;
      - logger.log: "Homing Rolluik 4 voltooid"


interval:
  - interval: 200ms
    then:
      - lambda: |-
          const uint32_t MAX_TIME = 45000; // 45 seconden maximale looptijd

          // --- ROLLUIK 1 LOGICA ---
          if (id(dir1) != 0) {
            // 1. Slider stop-logica (Check of doelpositie bereikt is)
            if (id(max1) > 0 && id(rolluik_1).position.has_value()) {
              float target = id(rolluik_1).position.value();
              float current = (float)id(pos1) / id(max1);
              if (std::abs(current - target) < 0.01 || (id(dir1) == 1 && current > target) || (id(dir1) == -1 && current < target)) {
                id(rolluik_1).stop();
              }
            }
            // 2. Veiligheid: Stroommeting (Stall) - Alleen als niet in homing-modus
            if (id(dir1) != 0 && id(current1).state > 1.8 && !id(is_homing1)) {
              id(rolluik_1).stop();
              ESP_LOGW("STALL", "Rolluik 1 gestopt op stroom");
            }
            // 3. Veiligheid: Time-out (Failsafe)
            else if (id(dir1) != 0 && (millis() - id(start_time1) > MAX_TIME)) {
              id(rolluik_1).stop();
              ESP_LOGE("TIMEOUT", "Rolluik 1 noodstop: tijd overschreden");
            }
          }

          // --- ROLLUIK 2 LOGICA ---
          if (id(dir2) != 0) {
            if (id(max2) > 0 && id(rolluik_2).position.has_value()) {
              float target = id(rolluik_2).position.value();
              float current = (float)id(pos2) / id(max2);
              if (std::abs(current - target) < 0.01 || (id(dir2) == 1 && current > target) || (id(dir2) == -1 && current < target)) {
                id(rolluik_2).stop();
              }
            }
            if (id(dir2) != 0 && id(current2).state > 1.8 && !id(is_homing2)) {
              id(rolluik_2).stop();
              ESP_LOGW("STALL", "Rolluik 2 gestopt op stroom");
            }
            else if (id(dir2) != 0 && (millis() - id(start_time2) > MAX_TIME)) {
              id(rolluik_2).stop();
              ESP_LOGE("TIMEOUT", "Rolluik 2 noodstop: tijd overschreden");
            }
          }

          // --- ROLLUIK 3 LOGICA ---
          if (id(dir3) != 0) {
            if (id(max3) > 0 && id(rolluik_3).position.has_value()) {
              float target = id(rolluik_3).position.value();
              float current = (float)id(pos3) / id(max3);
              if (std::abs(current - target) < 0.01 || (id(dir3) == 1 && current > target) || (id(dir3) == -1 && current < target)) {
                id(rolluik_3).stop();
              }
            }
            if (id(dir3) != 0 && id(current3).state > 1.8 && !id(is_homing3)) {
              id(rolluik_3).stop();
              ESP_LOGW("STALL", "Rolluik 3 gestopt op stroom");
            }
            else if (id(dir3) != 0 && (millis() - id(start_time3) > MAX_TIME)) {
              id(rolluik_3).stop();
              ESP_LOGE("TIMEOUT", "Rolluik 3 noodstop: tijd overschreden");
            }
          }

          // --- ROLLUIK 4 LOGICA ---
          if (id(dir4) != 0) {
            if (id(max4) > 0 && id(rolluik_4).position.has_value()) {
              float target = id(rolluik_4).position.value();
              float current = (float)id(pos4) / id(max4);
              if (std::abs(current - target) < 0.01 || (id(dir4) == 1 && current > target) || (id(dir4) == -1 && current < target)) {
                id(rolluik_4).stop();
              }
            }
            if (id(dir4) != 0 && id(current4).state > 1.8 && !id(is_homing4)) {
              id(rolluik_4).stop();
              ESP_LOGW("STALL", "Rolluik 4 gestopt op stroom");
            }
            else if (id(dir4) != 0 && (millis() - id(start_time4) > MAX_TIME)) {
              id(rolluik_4).stop();
              ESP_LOGE("TIMEOUT", "Rolluik 4 noodstop: tijd overschreden");
            }
          }
