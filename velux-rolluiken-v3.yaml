substitutions:
  device_name: "waveshare-relay-velux"
  device_comment: "WaveShare ESP32-S3-POE-ETH-8DI-8RO"
  device_friendly: "Velux Rolluiken"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly}
  min_version: 2025.5.0
  comment: ${device_comment}
  name_add_mac_suffix: false

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - pcf85063.write_time: {}
  - platform: pcf85063
    id: pcf85063_time

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  manual_ip:
    static_ip: 192.168.0.28
    gateway: 192.168.0.1
    subnet: 255.255.255.0

web_server:
  port: 80

i2c:
  sda: GPIO42
  scl: GPIO41
  scan: true
  frequency: 100kHz

pca9554:
  - id: TCA9554_hub
    address: 0x20

# ========================
# INSTELBAAR VIA HA
# ========================

number:
  - platform: template
    name: "Stall current UP"
    id: stall_current_up
    min_value: 0.5
    max_value: 4.0
    step: 0.1
    initial_value: 2.3
    restore_value: true
    optimistic: true

  - platform: template
    name: "Stall current DOWN"
    id: stall_current_down
    min_value: 0.5
    max_value: 4.0
    step: 0.1
    initial_value: 1.8 # Vaak lager omdat zwaartekracht helpt
    restore_value: true
    optimistic: true

  - platform: template
    name: "Stall count"
    id: stall_count_max
    min_value: 1
    max_value: 10
    step: 1
    initial_value: 3
    restore_value: true
    optimistic: true

  - platform: template
    name: "Runtime R1"
    id: runtime1
    min_value: 5000
    max_value: 60000
    step: 500
    initial_value: 20000
    restore_value: true
    optimistic: true

  - platform: template
    name: "Runtime R2"
    id: runtime2
    min_value: 5000
    max_value: 60000
    step: 500
    initial_value: 20000
    restore_value: true
    optimistic: true

  - platform: template
    name: "Runtime R3"
    id: runtime3
    min_value: 5000
    max_value: 60000
    step: 500
    initial_value: 20000
    restore_value: true
    optimistic: true

  - platform: template
    name: "Runtime R4"
    id: runtime4
    min_value: 5000
    max_value: 60000
    step: 500
    initial_value: 20000
    restore_value: true
    optimistic: true

# ========================
# GLOBALS
# ========================

globals:
  # positie
  - id: pos1
    type: float
    restore_value: yes
    initial_value: "0"
  - id: pos2
    type: float
    restore_value: yes
    initial_value: "0"
  - id: pos3
    type: float
    restore_value: yes
    initial_value: "0"
  - id: pos4
    type: float
    restore_value: yes
    initial_value: "0"

  # richting
  - id: dir1
    type: int
  - id: dir2
    type: int
  - id: dir3
    type: int
  - id: dir4
    type: int

  # timing
  - id: start_time1
    type: uint32_t
  - id: start_time2
    type: uint32_t
  - id: start_time3
    type: uint32_t
  - id: start_time4
    type: uint32_t

  - id: start_ignore1
    type: uint32_t
  - id: start_ignore2
    type: uint32_t
  - id: start_ignore3
    type: uint32_t
  - id: start_ignore4
    type: uint32_t

  - id: last_update1
    type: uint32_t
  - id: last_update2
    type: uint32_t
  - id: last_update3
    type: uint32_t
  - id: last_update4
    type: uint32_t

  # stroom filtering
  - id: filt1
    type: float
  - id: filt2
    type: float
  - id: filt3
    type: float
  - id: filt4
    type: float

  - id: prev1
    type: float
  - id: prev2
    type: float
  - id: prev3
    type: float
  - id: prev4
    type: float

  - id: stall_counter1
    type: int
  - id: stall_counter2
    type: int
  - id: stall_counter3
    type: int
  - id: stall_counter4
    type: int

# ========================
# INA226
# ========================

sensor:
  - platform: ina226
    address: 0x40
    shunt_resistance: 0.1 ohm
    max_current: 5A
    adc_averaging: 2
    update_interval: 20ms
    current:
      id: current1
      name: "Stroom 1-VL"

  - platform: ina226
    address: 0x41
    shunt_resistance: 0.1 ohm
    max_current: 5A
    adc_averaging: 2
    update_interval: 20ms
    current:
      id: current2
      name: "Stroom 2-VR"

  - platform: ina226
    address: 0x44
    shunt_resistance: 0.1 ohm
    max_current: 5A
    adc_averaging: 2
    update_interval: 20ms
    current:
      id: current3
      name: "Stroom 3-AL"

  - platform: ina226
    address: 0x45
    shunt_resistance: 0.1 ohm
    max_current: 5A
    adc_averaging: 2
    update_interval: 20ms
    current:
      id: current4
      name: "Stroom 4-AR"

# ========================
# RELAYS (interlock)
# ========================

switch:
  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 0 }
    id: r1_up
    interlock: [r1_down]
  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 1 }
    id: r1_down
    interlock: [r1_up]

  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 2 }
    id: r2_up
    interlock: [r2_down]
  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 3 }
    id: r2_down
    interlock: [r2_up]

  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 4 }
    id: r3_up
    interlock: [r3_down]
  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 5 }
    id: r3_down
    interlock: [r3_up]

  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 6 }
    id: r4_up
    interlock: [r4_down]
  - platform: gpio
    pin: { pca9554: TCA9554_hub, number: 7 }
    id: r4_down
    interlock: [r4_up]

# ========================
# COVER
# ========================

cover:
  # ROLLUIK 1-VL
  - platform: template
    name: "Rolluik 1-VL"
    id: rolluik_1
    device_class: shutter
    lambda: "return id(pos1);"
    has_position: true
    open_action:
      - lambda: |-
          id(dir1) = 1;
          id(start_time1) = millis();
          id(start_ignore1) = millis();
          id(last_update1) = millis();
          if (id(pos1) > 0.95f) id(pos1) = 1.0f;
      - switch.turn_off: r1_down
      - delay: 400ms
      - switch.turn_on: r1_up
    close_action:
      - lambda: |-
          id(dir1) = -1;
          id(start_time1) = millis();
          id(start_ignore1) = millis();
          id(last_update1) = millis();
          if (id(pos1) < 0.05f) id(pos1) = 0.0f;
      - switch.turn_off: r1_up
      - delay: 400ms
      - switch.turn_on: r1_down
    stop_action:
      - lambda: id(dir1) = 0;
      - switch.turn_off: r1_up
      - switch.turn_off: r1_down

  # ROLLUIK 2-VR
  - platform: template
    name: "Rolluik 2-VR"
    id: rolluik_2
    device_class: shutter
    lambda: "return id(pos2);"
    has_position: true
    open_action:
      - lambda: |-
          id(dir2) = 1;
          id(start_time2) = millis();
          id(start_ignore2) = millis();
          id(last_update2) = millis();
          if (id(pos2) > 0.95f) id(pos2) = 1.0f;
      - switch.turn_off: r2_down
      - delay: 400ms
      - switch.turn_on: r2_up
    close_action:
      - lambda: |-
          id(dir2) = -1;
          id(start_time2) = millis();
          id(start_ignore2) = millis();
          id(last_update2) = millis();
          if (id(pos2) < 0.05f) id(pos2) = 0.0f;
      - switch.turn_off: r2_up
      - delay: 400ms
      - switch.turn_on: r2_down
    stop_action:
      - lambda: id(dir2) = 0;
      - switch.turn_off: r2_up
      - switch.turn_off: r2_down

  # ROLLUIK 3-AL
  - platform: template
    name: "Rolluik 3-AL"
    id: rolluik_3
    device_class: shutter
    lambda: "return id(pos3);"
    has_position: true
    open_action:
      - lambda: |-
          id(dir3) = 1;
          id(start_time3) = millis();
          id(start_ignore3) = millis();
          id(last_update3) = millis();
          if (id(pos3) > 0.95f) id(pos3) = 1.0f;
      - switch.turn_off: r3_down
      - delay: 400ms
      - switch.turn_on: r3_up
    close_action:
      - lambda: |-
          id(dir3) = -1;
          id(start_time3) = millis();
          id(start_ignore3) = millis();
          id(last_update3) = millis();
          if (id(pos3) < 0.05f) id(pos3) = 0.0f;
      - switch.turn_off: r3_up
      - delay: 400ms
      - switch.turn_on: r3_down
    stop_action:
      - lambda: id(dir3) = 0;
      - switch.turn_off: r3_up
      - switch.turn_off: r3_down

  # ROLLUIK 4-AR
  - platform: template
    name: "Rolluik 4-AR"
    id: rolluik_4
    device_class: shutter
    lambda: "return id(pos4);"
    has_position: true
    open_action:
      - lambda: |-
          id(dir4) = 1;
          id(start_time4) = millis();
          id(start_ignore4) = millis();
          id(last_update4) = millis();
          if (id(pos4) > 0.95f) id(pos4) = 1.0f;
      - switch.turn_off: r4_down
      - delay: 400ms
      - switch.turn_on: r4_up
    close_action:
      - lambda: |-
          id(dir4) = -1;
          id(start_time4) = millis();
          id(start_ignore4) = millis();
          id(last_update4) = millis();
          if (id(pos4) < 0.05f) id(pos4) = 0.0f;
      - switch.turn_off: r4_up
      - delay: 400ms
      - switch.turn_on: r4_down
    stop_action:
      - lambda: id(dir4) = 0;
      - switch.turn_off: r4_up
      - switch.turn_off: r4_down

# ========================
# INTERVAL LOGICA
# ========================

interval:
  - interval: 200ms
    then:
      - lambda: |-
          const int STALL_COUNT_MAX = (int)id(stall_count_max).state;
          const uint32_t IGNORE_MS = 1200;

          auto handle_rolluik = [&](int &dir, float current, float &filt, float &prev,
                                    int &counter, uint32_t start_time, uint32_t start_ignore,
                                    float &pos, float max_runtime, auto *up, auto *down, auto *cov) {
            if (dir == 0) {
              counter = 0;
              filt = 0;
              return;
            }

            uint32_t now = millis();
            float dt = 200.0f / max_runtime; 
            
            if (dir == 1) pos += dt;
            else if (dir == -1) pos -= dt;
            
            if (pos > 1.0f) pos = 1.0f;
            if (pos < 0.0f) pos = 0.0f;

            filt = 0.7f * filt + 0.3f * current;
            bool ignore = (now - start_ignore) < IGNORE_MS;
            float threshold = (dir == 1) ? id(stall_current_up).state : id(stall_current_down).state;

            if (!ignore) {
              if (filt > threshold) counter++;
              else if (counter > 0) counter--;
            }

            // STOP LOGICA + KALIBRATIE
            if (counter >= STALL_COUNT_MAX) {
              if (dir == 1) pos = 1.0f;
              if (dir == -1) pos = 0.0f;
              
              dir = 0;
              up->turn_off();
              down->turn_off();
              counter = 0;
              cov->publish_state(); // Forceert update naar Home Assistant
              ESP_LOGD("velux", "Stall gedetecteerd, positie gekalibreerd.");
            }

            // Veiligheid: stop na runtime + 2 seconden
            if (dir != 0 && (now - start_time > max_runtime + 2000)) {
              dir = 0;
              up->turn_off();
              down->turn_off();
              cov->publish_state();
            }
            prev = filt;
          };

          // Aanroepen inclusief de cover ID voor de publish_state actie
          handle_rolluik(id(dir1), id(current1).state, id(filt1), id(prev1), id(stall_counter1), id(start_time1), id(start_ignore1), id(pos1), id(runtime1).state, id(r1_up), id(r1_down), id(rolluik_1));
          handle_rolluik(id(dir2), id(current2).state, id(filt2), id(prev2), id(stall_counter2), id(start_time2), id(start_ignore2), id(pos2), id(runtime2).state, id(r2_up), id(r2_down), id(rolluik_2));
          handle_rolluik(id(dir3), id(current3).state, id(filt3), id(prev3), id(stall_counter3), id(start_time3), id(start_ignore3), id(pos3), id(runtime3).state, id(r3_up), id(r3_down), id(rolluik_3));
          handle_rolluik(id(dir4), id(current4).state, id(filt4), id(prev4), id(stall_counter4), id(start_time4), id(start_ignore4), id(pos4), id(runtime4).state, id(r4_up), id(r4_down), id(rolluik_4));
